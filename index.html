<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
        }
    </style>
</head>
<body>

    <!-- Кнопка -->
    <button onclick="showLoseMessage()">Нажми меня дебил</button>

    <!-- Место, где появится надпись -->
    <div id="message"></div>

    <!-- Скрипт, который меняет текст при нажатии -->
    <script>
        function showLoseMessage() {
            document.getElementById('message').innerText = 'Ты лох!';
        }
    </script>

</body>
</html>
